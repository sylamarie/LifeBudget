services:
  - type: web
    name: lifebudget-api
    runtime: docker
    rootDir: backend/LifeBudget.Api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: lifebudget-web
    runtime: static
    rootDir: frontend/lifebudget-web
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
